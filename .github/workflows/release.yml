name: Release
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify release commit pushed to main
        if: success()
        run: |
          git fetch origin main --quiet
          MAIN_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          LATEST_TAG=$(git describe --tags --abbrev=0 origin/main 2>/dev/null | sed 's/^v//')
          if [ -n "$LATEST_TAG" ] && [ "$MAIN_VERSION" != "$LATEST_TAG" ]; then
            echo "::error::Release inconsistency: package.json @ main = $MAIN_VERSION, latest tag = $LATEST_TAG"
            exit 1
          fi
