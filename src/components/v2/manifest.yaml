name: v2-hooks
purpose: Shared React hooks for the v2 component layer — motion preferences and text scramble animation
owner: nix
status: active

depends_on:
  - package: react
    why: useSyncExternalStore for SSR-safe media query subscription; useState/useEffect/useRef for animation

depended_on_by:
  - module: src/components/playground/ExperimentCard.tsx
    how: calls useReducedMotion() to disable card animations
  - module: src/components/playground/StatusIndicator.tsx
    how: calls useReducedMotion() to disable pulse animation
  - module: src/components/playground/ExperimentsLanding.tsx
    how: calls useReducedMotion() and useTextScramble() for landing page effects
  - module: src/components/ChatWidget.tsx
    how: calls useReducedMotion() and useTextScramble() for chat UI effects
  - module: src/components/v2/ProjectGridV2.tsx
    how: calls useReducedMotion() for grid animations
  - module: src/components/v2/HeroV2.tsx
    how: calls useTextScramble() for hero heading effect
  - module: src/components/v2/useTextScramble.ts
    how: calls useReducedMotion() internally

exports:
  - "useReducedMotion() — returns boolean for prefers-reduced-motion"
  - "useTextScramble(text, options?) — procedural text scramble animation hook"

notes: |
  useReducedMotion uses useSyncExternalStore with a server snapshot of false — SSR-safe.
  useTextScramble supports once-per-session gating via sessionStorage key.
  Both hooks are client-only but handle SSR gracefully.

contracts:
  - name: useReducedMotion return type
    type: schema_contract
    value: "boolean — always returns false on server, live media query result on client"
    notes: Consumers must not derive render-blocking logic from this value; animation only
  - name: useTextScramble options shape
    type: schema_contract
    value: "{ once?: boolean; speed?: number } — all fields optional"
    notes: Extending options must maintain backward compatibility; no required fields added
  - name: sessionStorage key format
    type: schema_contract
    value: "scramble-done-{text-hash} — internal, not stable API"
    notes: Key is implementation detail; consumers must not read or clear it directly

failure_modes:
  - trigger: window.matchMedia not available (SSR or non-browser env)
    impact: useReducedMotion returns false (motion enabled) — safe default
    type: graceful
  - trigger: sessionStorage unavailable (private browsing, storage quota)
    impact: useTextScramble falls back to running every mount — no crash, animation reruns
    type: graceful
  - trigger: React version missing useSyncExternalStore
    impact: useReducedMotion throws at import — entire hook layer fails to load
    type: propagated

performance:
  - metric: useReducedMotion re-render cost
    expected: "Single subscription; re-renders only on media query change — O(1)"
    notes: useSyncExternalStore avoids unnecessary renders on unrelated state changes
  - metric: useTextScramble animation frame budget
    expected: "N/A — runs requestAnimationFrame loops; no formal budget enforced"
    notes: Controlled by speed option; consumers should respect prefers-reduced-motion via useReducedMotion
