name: types
purpose: TypeScript interfaces for Project and Experiment entities used across the entire app
owner: nix
status: active

depends_on: []

depended_on_by:
  - module: src/lib/projects.ts
    how: imports Project interface for typed data loading
  - module: src/components/v2/SystemBoot.tsx
    how: imports Project for boot sequence rendering
  - module: src/components/v2/ProjectDetailV2.tsx
    how: imports Project for detail drawer rendering
  - module: src/components/ProjectCard.tsx
    how: imports Project for card rendering
  - module: src/components/v2/ProjectGridV2.tsx
    how: imports Project for grid filtering and rendering
  - module: src/components/v2/ProjectCardV2.tsx
    how: imports Project for v2 card rendering
  - module: src/app/module/[slug]/page.tsx
    how: imports Project for dynamic route page generation
  - module: src/app/module/[slug]/opengraph-image.tsx
    how: imports Project for OG image generation
  - module: src/app/module/[slug]/ModuleDetailClient.tsx
    how: imports Project for client-side module detail
  - module: src/app/sitemap.ts
    how: imports Project for sitemap generation
  - module: src/components/AppShell.tsx
    how: imports Project for app shell rendering
  - module: src/components/playground/ExperimentCard.tsx
    how: imports Experiment for card rendering
  - module: src/components/playground/StatusIndicator.tsx
    how: imports ExperimentStatus for status badge
  - module: src/components/playground/ExperimentsLanding.tsx
    how: imports Experiment for landing grid
  - module: src/components/playground/ExperimentDetail.tsx
    how: imports Experiment for detail rendering
  - module: src/app/playground/[slug]/page.tsx
    how: imports Experiment for experiment page generation

exports:
  - interface Project
  - interface ArticleSection
  - type ExperimentStatus
  - interface Experiment

notes: |
  Contains two type files: project.ts (Project, ArticleSection) and experiment.ts (Experiment, ExperimentStatus).
  Project is the most widely imported interface in the codebase (11+ consumers).
  Do not duplicate these interfaces — this is the single source of truth.

contracts:
  - name: Project interface shape
    type: schema_contract
    value: "slug, title, version, lastUpdated, status, tags[], description, url, articleSections[]"
    notes: All fields typed strictly — no optional fields may be removed without updating all 11+ consumers. Adding optional fields is backward compatible
  - name: Experiment interface shape
    type: schema_contract
    value: "slug, title, status (ExperimentStatus), tags[], description, createdAt, previewVideo? (optional)"
    notes: "ExperimentStatus is a string union — additions are non-breaking; removals break StatusIndicator. previewVideo is an optional asset path; when set, ExperimentCard renders a lazy-loaded looping <video>; when absent, on 404, or on codec error, falls back to getPreviewPattern() CSS treatment. prefers-reduced-motion users always receive the CSS pattern regardless of field presence."
  - name: ArticleSection interface shape
    type: schema_contract
    value: "heading: string; body: string"
    notes: Used in Project.articleSections[]; shape must remain stable across CMS and rendering consumers
  - name: Type-only exports
    type: schema_contract
    value: "N/A — all exports are TypeScript types/interfaces; zero runtime footprint"
    notes: This module emits no JavaScript — it is erased at compile time. Any runtime check on these types must use type guards

failure_modes:
  - trigger: Interface field renamed or removed without updating consumers
    impact: TypeScript build fails across all 16 consumers — site cannot deploy
    type: propagated
  - trigger: ExperimentStatus union value removed
    impact: StatusIndicator receives unhandled value — falls back to default styling or throws; depends on consumer's exhaustive check
    type: propagated
  - trigger: Type file deleted or moved without path alias update
    impact: All 16 consumers fail to compile — full build break
    type: propagated

performance:
  - metric: Compile-time cost
    expected: "N/A — type-only module; erased at emit. No runtime cost."
    notes: TypeScript structural typing means interface checks are compile-time only
  - metric: Import resolution
    expected: "N/A — resolved by TypeScript compiler; zero runtime overhead"
    notes: No tree-shaking concern — this module produces no bundle output
